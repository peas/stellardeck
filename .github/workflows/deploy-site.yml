name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'demo/**'
      - 'slides2.js'
      - 'slides2.css'
      - 'deckset-parser.js'
      - 'autoflow.js'
      - 'css/**'
      - 'embed/stellar-embed.js'
      - 'vendor/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install site dependencies
        run: cd site && npm ci
      - name: Build site
        run: cd site && npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
      - id: deployment
        uses: actions/deploy-pages@v4
