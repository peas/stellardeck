# ═══════════════════════════════════════════════════════════════
# CODE
# ═══════════════════════════════════════════════════════════════

- id: code-fenced
  category: code
  name: Fenced code block
  status: implemented
  target: n/a
  deckset: true
  syntax: "```lang ... ```"
  example: |
    # Example

    ```python
    def hello():
        print("Hello, world!")
        return 42
    ```
  description: >
    Fenced code block with optional language tag.
    Content is HTML-escaped (&, <, >).

- id: code-syntax-highlight
  category: code
  name: Syntax highlighting
  status: planned
  target: "1.0"
  deckset: true
  syntax: "```python ... ```"
  example: |
    # Highlighted Code

    ```javascript
    const greet = (name) => {
      console.log(`Hello, ${name}!`);
    };
    ```
  description: >
    Syntax coloring for code blocks. Uses highlight.js loaded from CDN
    on first use (lazy-loaded when code blocks are present).
  notes: >
    highlight.js is loaded from cdnjs on demand. The StellarSlides
    getPlugin('highlight') method returns an hljs adapter.

- id: code-line-highlight
  category: code
  name: Line highlighting
  status: planned
  target: "1.0"
  deckset: false
  syntax: "```python {3-5} ... ```"
  example: |
    # Focus on the key line

    ```python {2}
    def train(model, data):
        loss = model.forward(data)  # <-- this line highlighted
        loss.backward()
        optimizer.step()
    ```
  description: >
    Highlight specific lines in a code block. StellarSlides highlight
    plugin supports data-line-numbers attribute.
    Syntax: {3}, {3-5}, {1,3,5}, {1-3|5-7} (stepped).
  notes: >
    Not a Deckset feature. StellarDeck extension. Parse the {N-M}
    after the language tag and emit data-line-numbers on <code>.

