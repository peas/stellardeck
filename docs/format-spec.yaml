- id: footnotes
  category: text-formatting
  name: Footnotes
  status: not-planned
  target: n/a
  deckset: true
  syntax: "[^1] / [^1]: text"
  example: |
    # Research

    According to recent studies[^1], AI adoption is accelerating.

    [^1]: McKinsey Global Survey, 2024
  description: >
    Footnote references and definitions. Rarely used in presentations.
  notes: >
    Low priority — footnotes don't translate well to slides.
    If needed, use speaker notes instead.

- id: emoji
  category: text-formatting
  name: "Emoji shortcodes"
  status: not-planned
  target: n/a
  deckset: true
  syntax: ":emoji_name:"
  example: |
    # Status

    :rocket: Launched
    :warning: Needs attention
  description: >
    GitHub-style emoji shortcodes. Low priority — use native
    Unicode emoji instead (works everywhere).
