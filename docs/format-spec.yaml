# ═══════════════════════════════════════════════════════════════
# EXTENDED — ::: BLOCK DIRECTIVES (StellarDeck extensions)
# ═══════════════════════════════════════════════════════════════

- id: ext-math
  category: extended
  name: "Math / LaTeX (:::math)"
  status: planned
  target: "1.0"
  deckset: false
  syntax: ":::math ... :::"
  example: |
    # Gradient Descent

    :::math
    \theta_{t+1} = \theta_t - \alpha \nabla J(\theta_t)
    :::

    Where $\alpha$ is the learning rate.
  description: >
    Block-level math rendering via KaTeX.
    Also support inline math with $formula$ syntax.
    StellarSlides has RevealMath plugin (KaTeX + MathJax).
  notes: >
    Deckset uses $$ for block and $ for inline (standard LaTeX).
    We should support both: $$ and :::math for block,
    $ for inline. KaTeX is lighter than MathJax (~300KB vs ~5MB).

- id: ext-diagram
  category: extended
  name: "Diagram (:::diagram)"
  status: planned
  target: "1.0"
  deckset: false
  syntax: ":::diagram ... :::"
  example: |
    # Architecture

    :::diagram
    graph LR
      A[Browser] --> B[Tauri]
      B --> C[StellarSlides]
      B --> D[File System]
    :::
  description: >
    Mermaid diagram with handDrawn mode (look: "handDrawn",
    theme: "neutral"). Renders SVG inline in the slide.
    Supports flowchart, sequence, ER, class, state, etc.
  notes: >
    Mermaid is ~68MB but can be lazy-loaded on first use.
    Default config: { look: "handDrawn", theme: "neutral" }.
    Future: D2 as premium alternative via :::d2.


- id: ext-columns
  category: extended
  name: "Columns (:::columns)"
  status: planned
  target: "1.0"
  deckset: false
  syntax: ":::columns ... ::: ... :::"
  example: |
    # Before vs After

    :::columns
    ## Before
    - Manual process
    - 3 hours/week
    - Error-prone

    :::
    ## After
    - Automated
    - 5 minutes/week
    - 99.9% accuracy
    :::
  description: >
    Multi-column layout. Each ::: separator starts a new column.
    Columns are evenly distributed (2 cols = 50/50, 3 = 33/33/33).
    Content in each column is regular Markdown.
  notes: >
    Pandoc uses ::::columns / :::: for this.
    Slidev uses <div class="grid grid-cols-2">.
    Our syntax is simpler: ::: separates columns within the block.

- id: ext-qr-block
  category: extended
  name: "QR code block (:::qr)"
  status: planned
  target: "1.0"
  deckset: false
  syntax: ":::qr ... :::"
  example: |
    :::qr
    https://alura.com.br/ai
    Sign up for free
    :::
  description: >
    Block-level QR code with optional label text below.
    For simple inline QR, use ![qr](url) instead.
    The block form allows additional customization.
  notes: >
    Most cases will use ![qr](url) image syntax.
    Block form is for when you want a label or custom styling.

- id: ext-html
  category: extended
  name: "Raw HTML (:::html)"
  status: planned
  target: "1.1"
  deckset: false
  syntax: ":::html ... :::"
  example: |
    # Custom embed

    :::html
    <div style="display:flex; gap:1rem; justify-content:center">
      <div style="padding:2rem; background:#1e293b; border-radius:12px">
        Custom HTML content
      </div>
    </div>
    :::
  description: >
    Escape hatch for raw HTML injection. Content is inserted
    directly into the slide without markdown processing.
    Use sparingly — prefer native features when possible.

- id: ext-steps
  category: extended
  name: "Steps / fragments (:::steps)"
  status: planned
  target: "1.1"
  deckset: false
  syntax: ":::steps ... :::"
  example: |
    # Process

    :::steps
    First, we collect data.

    Then, we train the model.

    Finally, we deploy.
    :::
  description: >
    Each paragraph within the block appears incrementally
    (StellarSlides fragments). Unlike build-lists which only works
    on list items, steps works on any content.
  notes: >
    Each paragraph (separated by blank line) gets class="fragment".

- id: ext-ascii
  category: extended
  name: "ASCII art (:::ascii)"
  status: planned
  target: "1.1"
  deckset: false
  syntax: ":::ascii ... :::"
  example: |
    # Architecture

    :::ascii
    ┌─────────┐     ┌─────────┐     ┌─────────┐
    │ Browser │────>│  Tauri  │────>│  Files  │
    └─────────┘     └─────────┘     └─────────┘
    :::
  description: >
    Preserves whitespace and renders in monospace font with
    optional styling (box-drawing characters, etc.).
    Larger font than code blocks, no syntax highlighting.

- id: ext-center
  category: extended
  name: "Center block (:::center)"
  status: planned
  target: "1.1"
  deckset: false
  syntax: ":::center ... :::"
  example: |
    :::center
    # Thank You

    Paulo Silveira
    @paulosilveira
    :::
  description: >
    Centers all content horizontally and vertically.
    Useful for closing slides, quotes, and statements.

- id: ext-chart
  category: extended
  name: "Chart (:::chart)"
  status: planned
  target: future
  deckset: false
  syntax: ":::chart ... :::"
  example: |
    # Growth

    :::chart bar
    2020: 500000
    2021: 1200000
    2022: 2100000
    2023: 3000000
    2024: 4500000
    :::
  description: >
    Simple chart (bar, pie, line) from inline data.
    Renders SVG. Minimal syntax — label: value per line.
  notes: >
    Could use a lightweight charting lib or generate SVG directly.
    Bar charts are the most common in presentations.

