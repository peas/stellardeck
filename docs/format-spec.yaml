    Combinable with other modifiers (inline, left, right).

- id: image-qr
  category: images
  name: QR code from URL
  status: planned
  target: "1.0"
  deckset: false
  syntax: "![qr](url)"
  example: |
    ![right, qr](https://alura.com.br/ai)

    # Scan for AI courses

    Access our free AI learning path.
  description: >
    Generates a QR code SVG from the URL at render time.
    Combines with all image modifiers: inline, right, left, percentage.
    No external image needed — generated in-browser.
  notes: >
    Use a lightweight QR library (qrcode-generator, ~8KB).
    Output SVG, style with theme colors.

