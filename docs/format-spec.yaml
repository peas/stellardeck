# StellarDeck Format Specification
# Deckset-compatible markdown + StellarDeck extensions
#
# status: implemented | partial | planned | not-planned
# target: 1.0 | 1.1 | future | n/a
# deckset: whether original Deckset supports this feature
#
# This file is the source of truth for:
# - Documentation generation
# - Sample deck generation (from examples)
# - Feature tracking / progress
# - Parser test coverage

# ═══════════════════════════════════════════════════════════════
# STRUCTURE
# ═══════════════════════════════════════════════════════════════

- id: slide-separator
  category: structure
  name: Slide separator
  status: implemented
  target: n/a
  deckset: true
  syntax: "---"
  example: |
    # Slide 1

    ---

    # Slide 2
  description: >
    Three dashes on their own line separate slides.
    Must have blank line before and after (or be at start/end of file).

- id: speaker-notes-caret
  category: structure
  name: "Speaker notes (^ prefix)"
  status: implemented
  target: n/a
  deckset: true
  syntax: "^ Note text"
  example: |
    # My Slide

    Key point here.

    ^ This is only visible in presenter mode.
    ^ Second note paragraph.
  description: >
    Lines starting with ^ are speaker notes, hidden from the audience.
    Multiple ^ lines in one slide are concatenated.

- id: speaker-notes-html-comment
  category: structure
  name: "Speaker notes (<!-- comment -->)"
  status: planned
  target: "1.0"
  deckset: false
  syntax: "<!-- Note text -->"
  example: |
    # My Slide

    Content here.

    <!-- This is a speaker note, Marp/Slidev compatible -->
  description: >
    HTML comments as speaker notes. Universal syntax used by
    Marp, Slidev, and standard Markdown. Increases portability.
  notes: >
    Only comments that are NOT directives should become notes.
    Marp uses comments for both directives and notes.

# ═══════════════════════════════════════════════════════════════
# FRONTMATTER
# ═══════════════════════════════════════════════════════════════

- id: frontmatter-footer
  category: frontmatter
  name: Footer text
  status: implemented
  target: n/a
  deckset: true
  syntax: "footer: Text"
  example: |
    footer: @paulosilveira
    slidenumbers: true

    # First Slide
  description: >
    Displays footer text on every slide. Placed at top of file
    before any slide content.

- id: frontmatter-slidenumbers
  category: frontmatter
  name: Slide numbers
  status: implemented
  target: n/a
  deckset: true
  syntax: "slidenumbers: true"
  example: |
    slidenumbers: true

    # First Slide
  description: >
    Shows slide numbers. In Deckset, appears in corner.
    In StellarDeck, shown in toolbar counter.

- id: frontmatter-theme
  category: frontmatter
  name: Theme
  status: implemented
  target: n/a
  deckset: true
  syntax: "theme: Theme Name, N"
  example: |
    theme: Letters from Sweden, 7

    # First Slide
  description: >
    Sets the presentation theme and optional color scheme number.
    StellarDeck themes: Default (Inter), Letters from Sweden, Serif,
    Minimal, Hacker, Poster, Alun, Borneli.

- id: frontmatter-build-lists
  category: frontmatter
  name: Build lists (global)
  status: partial
  target: "1.0"
  deckset: true
  syntax: "build-lists: true"
  example: |
    build-lists: true

    # Tools

    - Copilot
    - Cursor
    - Claude Code
  description: >
    Makes all list items appear one by one (incremental reveal).
    Parser adds fragment class to <li> elements. StellarSlides handles animation.
  notes: >
    Parser adds class="fragment" but StellarSlides fragment animation
    needs testing/polish. Marked partial until E2E verified.

- id: frontmatter-slide-transition
  category: frontmatter
  name: Slide transition (global)
  status: partial
  target: "1.0"
  deckset: true
  syntax: "slide-transition: fade"
  example: |
    slide-transition: fade

    # First Slide

    ---

    # Second Slide (fades in)
  description: >
    Sets the default transition between slides.
    Values: none, fade, slide, convex, concave, zoom.
  notes: >
    Parser writes data-transition attribute. StellarSlides supports it
    but wiring needs verification. Deckset values: fade, push, reveal, pop.

- id: frontmatter-autoscale
  category: frontmatter
  name: Autoscale
  status: partial
  target: "1.1"
  deckset: true
  syntax: "autoscale: true"
  example: |
    autoscale: true

    # Slide with lots of text

    Lorem ipsum dolor sit amet, consectetur adipiscing elit.
    Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
  description: >
    Automatically scales down content that overflows the slide.
    Parser stores the value but scaling logic not yet implemented.

# ═══════════════════════════════════════════════════════════════
# DIRECTIVES (per-slide)
# ═══════════════════════════════════════════════════════════════

- id: directive-background-color
