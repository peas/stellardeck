  target: n/a
  deckset: true
  syntax: "[.background-color: #hex]"
  example: |
    [.background-color: #1e3a5f]

    # Dark Blue Slide

    Custom background color.
  description: >
    Sets the slide background to a specific color.
    Overrides the theme's default background.

- id: directive-background-image
  category: directives
  name: Background image (directive)
  status: implemented
  target: n/a
  deckset: true
  syntax: "[.background-image: url]"
  example: |
    [.background-image: photo.jpg]

    # Text over image
  description: >
    Alternative to ![](img) for setting a background image via directive.

- id: directive-slide-transition
  category: directives
  name: Slide transition (per-slide)
  status: partial
  target: "1.0"
  deckset: true
  syntax: "[.slide-transition: type]"
  example: |
    [.slide-transition: zoom]

    # This slide zooms in
  description: >
    Overrides the global transition for this specific slide.

- id: directive-build-lists
  category: directives
  name: Build lists (per-slide)
  status: partial
  target: "1.0"
  deckset: true
  syntax: "[.build-lists: true]"
  example: |
    [.build-lists: true]

    # Step by step

    - First
    - Second
    - Third
  description: >
    Enables incremental list reveal for this slide only.

- id: directive-header-color
  category: directives
  name: Header color
  status: planned
  target: "1.0"
  deckset: true
  syntax: "[.header: #hex]"
  example: |
    [.header: #ff6600]

    # Orange heading
  description: >
    Overrides heading color for this slide.
    Deckset syntax: [.header: #color].

- id: directive-text-color
  category: directives
  name: Text color
  status: planned
  target: "1.0"
  deckset: true
  syntax: "[.text: #hex]"
  example: |
    [.text: #cccccc]

    # Heading

    This body text is light gray.
  description: >
    Overrides body text color for this slide.

- id: directive-text-alignment
  category: directives
  name: Text alignment
  status: planned
  target: "1.1"
  deckset: true
  syntax: "[.text-emphasis: alignment]"
  example: |
    [.text-emphasis: center]

    # Centered content

    All text on this slide is centered.
  description: >
    Sets text alignment for the entire slide.
    Values: left, center, right.

- id: directive-hide-footer
  category: directives
  name: Hide footer
  status: planned
  target: "1.1"
  deckset: true
  syntax: "[.hide-footer]"
  example: |
    [.hide-footer]

    # Clean slide

    No footer on this one.
  description: >
    Hides the footer on a specific slide (e.g., title or image-only slides).

# ═══════════════════════════════════════════════════════════════
# HEADINGS
# ═══════════════════════════════════════════════════════════════

- id: heading-h1-h6
  category: headings
  name: "Headings (H1–H6)"
  status: implemented
  target: n/a
  deckset: true
  syntax: "# to ######"
  example: |
    # Heading 1
    ## Heading 2
    ### Heading 3
    #### Heading 4
  description: >
    Standard Markdown headings. Space after # is optional in Deckset
    (our parser handles both).

- id: heading-fit
  category: headings
  name: "Auto-fit heading (#[fit])"
  status: implemented
  target: n/a
  deckset: true
  syntax: "#[fit] Text"
  example: |
    #[fit] Big Bold
    #[fit] Statement
  description: >
    Heading that automatically scales to fill the slide width.
    Multiple consecutive #[fit] lines share inline markdown context
    (bold/italic can span lines). Uses off-screen DOM measurement.
  notes: >
    Must copy textTransform from heading to measurer (themes may
    apply uppercase). See feedback_fittext_measurement.md.

